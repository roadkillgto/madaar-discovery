<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mada'ar | Al Qua'a Discovery Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>Mada'ar (The Orbit)</h1>
            <p>Connecting Al Qua'a: Eco-Tourism, Local Farms & Community Services</p>
        </div>
    </header>

    <main>
        <section class="controls">
            <button class="filter-btn active" data-filter="all">All Services</button>
            <button class="filter-btn" data-filter="Astrotourism">Astrotourism</button>
            <button class="filter-btn" data-filter="Farm Tours">Farm Tours</button>
            <button class="filter-btn" data-filter="Emergency Services">Emergency & Recovery</button>
        </section>

        <section id="hub-grid" class="grid-container">
            <!-- Cards will be injected here by app.js -->
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
